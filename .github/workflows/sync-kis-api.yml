name: Sync KIS API Spec

on:
  schedule:
    - cron: '0 15 * * *' # 매일 한국 시간 00:00 (UTC 15:00)
  workflow_dispatch: # 수동 실행 지원

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyyaml inflection
          python -m playwright install chromium

      - name: Fetch Latest API Spec
        run: python scripts/fetch_spec.py

      - name: Generate Rust Code
        run: python scripts/generate_code.py

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify API with VTS (Integration Test)
        env:
          VTS_APP_KEY: ${{ secrets.VTS_APP_KEY }}
          VTS_APP_SECRET: ${{ secrets.VTS_APP_SECRET }}
          VTS_ACCOUNT_NUM: ${{ secrets.VTS_ACCOUNT_NUM }}
        run: cd crates/kis_api && cargo test --test verify_generated -- --nocapture

      - name: Format Generated Code
        run: cargo fmt --all

      - name: Verify Format
        run: cargo fmt --all --check

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update KIS API spec and generated code"
          committer: GitHub <noreply@github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: chore/sync-kis-api
          title: "chore: auto-update KIS API specification"
          body: |
            ## KIS API Spec Sync Report
            - KIS API Portal에서 최신 명세를 가져왔습니다.
            - `src/generated/` 내의 Rust 코드가 재생성되었습니다.
            - `cargo fmt --all` 적용 및 `--check` 검증 완료.
          labels: |
            automation
            codegen
          delete-branch: true
