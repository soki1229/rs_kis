- name: 국내주식 실시간체결통보
  description: 국내주식 실시간체결통보 [실시간-005]
  example: '국내주식 실시간 체결통보 수신 시에 (1) 주문·정정·취소·거부 접수 통보 와 (2) 체결 통보 가 모두 수신됩니다.

    (14번째 값(CNTG_YN;체결여부)가 2이면 체결통보, 1이면 주문·정정·취소·거부 접수 통보입니다.)


    ※ 모의투자는 H0STCNI9 로 변경하여 사용합니다.


    [참고자료]

    실시간시세(웹소켓) 파이썬 샘플코드는 한국투자증권 Github 참고 부탁드립니다.

    https://github.com/koreainvestment/open-trading-api/blob/main/websocket/python/ws_domestic_overseas_all.py


    실시간시세(웹소켓) API 사용방법에 대한 자세한 설명은 한국투자증권 Wikidocs 참고 부탁드립니다.

    https://wikidocs.net/book/7847 (국내주식 업데이트 완료, 추후 해외주식·국내선물옵션 업데이트 예정)


    [호출 데이터]

    헤더와 바디 값을 합쳐 JSON 형태로 전송합니다.


    [응답 데이터]

    1. 정상 등록 여부 (JSON)

    - JSON["body"]["msg1"] - 정상 응답 시, SUBSCRIBE SUCCESS

    - JSON["body"]["output"]["iv"] - 실시간 결과 복호화에 필요한 AES256 IV (Initialize Vector)

    - JSON["body"]["output"]["key"] - 실시간 결과 복호화에 필요한 AES256 Key


    2. 실시간 결과 응답 ( | 로 구분되는 값)

    - 암호화 유무 : 0 암호화 되지 않은 데이터 / 1 암호화된 데이터

    - TR_ID : 등록한 tr_id

    - 데이터 건수 : (ex. 001 데이터 건수를 참조하여 활용)

    - 응답 데이터 : 아래 response 데이터 참조 ( ^로 구분됨)


    체결 통보 응답 결과는 암호화되어 출력됩니다. AES256 KEY IV를 활용해 복호화하여 활용하세요. 자세한 예제는 [도구>wikidocs]에
    준비되어 있습니다.'
  method: POST
  endpoint: /tryitout/H0STCNI0
  real_tr_id: H0STCNI0
  vts_tr_id: H0STCNI9
  request:
  - name: tr_id
    korean_name: 거래ID
    type: String
    required: Y
    description: '''[실전/모의투자]

      H0STCNI0 : 국내주식 실시간체결통보

      H0STCNI9 : 모의투자 실시간 체결통보'
  - name: tr_key
    korean_name: 구분값
    type: String
    required: Y
    description: HTS ID
  response: []
