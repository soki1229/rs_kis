- name: 주식예약주문
  description: '2021-12-29 11:22:33'
  example: "국내주식 예약주문 매수/매도 API 입니다.\n\n※ POST API의 경우 BODY값의 key값들을 대문자로 작성하셔야 합니다.\n\
    \   (EX. \"CANO\" : \"12345678\", \"ACNT_PRDT_CD\": \"01\",...)\n\n※ 유의사항\n 1.\
    \ 예약주문 가능시간 : 15시 40분 ~ 다음 영업일 7시 30분 \n    (단, 서버 초기화 작업 시 예약주문 불가 : 23시 40분\
    \ ~ 00시 10분)\n    ※ 예약주문 처리내역은 통보되지 않으므로 주문처리일 장 시작전에 반드시 주문처리 결과를 확인하시기 바랍니다.\n\
    \n 2. 예약주문 안내\n   - 예약종료일 미입력 시 일반예약주문으로 최초 도래하는 영업일에 주문 전송됩니다.\n   - 예약종료일 입력\
    \ 시 기간예약주문으로 최초 예약주문수량 중 미체결 된 수량에 대해 예약종료일까지 매 영업일 주문이\n      실행됩니다. (예약종료일은\
    \ 익영업일부터 달력일 기준으로 공휴일 포함하여 최대 30일이 되는 일자까지 입력가능)\n   - 예약주문 접수 처리순서는 일반/기간예약주문\
    \ 중 신청일자가 빠른 주문이 우선합니다.\n      단, 기간예약주문 자동배치시간(약 15시35분 ~ 15시55분)사이 접수되는 주문의\
    \ 경우 당일에 한해 순서와 상관없이\n      처리될 수 있습니다.\n   - 기간예약주문 자동배치시간(약 15시35분 ~ 15시55분)에는\
    \ 예약주문 조회가 제한 될 수 있습니다.\n   - 기간예약주문은 계좌 당 주문건수 최대 1,000건으로 제한됩니다.\n\n3. 예약주문\
    \ 접수내역 중 아래의 사유 등으로 인해 주문이 거부될 수 있사오니, 주문처리일 장 시작전에 반드시\n    주문처리 결과를 확인하시기 바랍니다.\n\
    \    * 주문처리일 기준 : 매수가능금액 부족, 매도가능수량 부족, 주문수량/호가단위 오류, 대주 호가제한, \n            \
    \                  신용/대주가능종목 변경, 상/하한폭 변경, 시가형성 종목(신규상장 등)의 시장가, 거래서비스 미신청 등\n\
    \n 4. 익일 예상 상/하한가는 조회시점의 현재가로 계산되며 익일의 유/무상증자, 배당, 감자, 합병, 액면변경 등에 의해\n    변동될\
    \ 수 있으며 이로 인해 상/하한가를 벗어나 주문이 거부되는 경우가 발생할 수 있사오니, 주문처리일 장 시작전에\n    반드시 주문처리결과를\
    \ 확인하시기 바랍니다.\n\n 5. 정리매매종목, ELW, 신주인수권증권, 신주인수권증서 등은 가격제한폭(상/하한가) 적용 제외됩니다.\n\
    \n 6. 영업일 장 시작 후 [기간예약주문] 내역 취소는 해당시점 이후의 예약주문이 취소되는 것으로, \n    일반주문으로 이미 전환된\
    \ 주문에는 영향을 미치지 않습니다. 반드시 장 시작전 주문처리결과를 확인하시기 바랍니다."
