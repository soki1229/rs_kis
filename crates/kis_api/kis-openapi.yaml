  description: 해외주식조건검색[v1_해외주식-015]
  example: "해외주식 조건검색 API입니다.\n한국투자 HTS(eFriend Plus) > [7641] 해외주식 조건검색 화면의 기능을 API로\
    \ 개발한 사항으로, 해당 화면을 참고하시면 기능을 이해하기 쉽습니다.\n  \n현재 조건검색 결과값은 최대 100개까지 조회 가능합니다.\
    \ 다음 조회(100개 이후의 값) 기능에 대해서는 개선검토 중에 있습니다.\n\n※ 지연시세 지연시간 : 미국 - 실시간무료(0분지연) /\
    \ 홍콩, 베트남, 중국, 일본 - 15분지연 (중국은 실시간시세 신청 시 무료실시간시세 제공)\n   미국의 경우 0분지연시세로 제공되나,\
    \ 장중 당일 시가는 상이할 수 있으며, 익일 정정 표시됩니다.\n\n※ 2024년 12월 13일(금) 오후 5시부터 HTS(efriend\
    \ Plus) [7781] 시세신청(실시간) 화면에서 유료 서비스 신청 후 접근토큰 발급하면 최대 2시간 이후 실시간 유료 시세 수신 가능\n\
    \n※ 그날 거래량이나 시세 형성이 안된 종목은 해외주식 기간별시세(HHDFS76240000)에서는 조회되지만 \n   해외주식 조건검색(HHDFS76410000)에서\
    \ 조회되지 않습니다. (EX. NAS AATC)\n\n[미국주식시세 이용시 유의사항]\n■ 무료 실시간 시세 서비스가 기본 제공되며, 유료\
    \ 실시간 시세 서비스는 HTS ‘[7781] 시세신청 (실시간)’과 MTS(모바일) ‘고객서비스 > 거래 서비스신청 > 해외주식 > 해외\
    \ 실시간시세 신청’ 에서 신청 가능합니다.\n※ 무료(매수/매도 각 1호가) : 나스닥 마켓센터에서 거래되는 호가 및 호가 잔량 정보\n\
    ※ 유료(매수/매도 각 1호가) : 미국 전체 거래소들의 통합 주문체결 및 최우선 호가\n■ 무료 실시간 시세 서비스는 유료 실시간 시세 서비스\
    \ 대비 평균 50% 수준에 해당하는 정보이므로 \n현재가/호가/순간체결량/차트 등에서 일시적·부분적 차이가 있을 수 있습니다. \n■ 무료∙유료\
    \ 모두 미국에 상장된 종목(뉴욕, 나스닥, 아멕스 등)의 시세를 제공하며, 동일한 시스템을 사용하여 주문∙체결됩니다. \n단, 무료∙유료의\
    \ 기반 데이터 차이로 호가 및 체결 데이터는 차이가 발생할 수 있고, 이로 인해 발생하는 손실에 대해서 당사가 책임지지 않습니다.\n■ 무료\
    \ 실시간 시세 서비스의 시가, 저가, 고가, 종가는 유료 실시간 시세 서비스와 다를 수 있으며, \n종목별 과거 데이터(거래량, 시가, 종가,\
    \ 고가, 차트 데이터 등)는 장 종료 후(오후 12시경) 유료 실시간 시세 서비스 데이터와 동일하게 업데이트됩니다.\n■ 유료 실시간 시세\
    \ 서비스는 신청 시 1~12개월까지 기간 선택 후 해당 요금을 일괄 납부하며, \n해지 시 해지한 달의 말일까지 시세 제공 후 남은 기간\
    \ 해당 금액이 환급되니 유의하시기 바랍니다.\n(출처: 한국투자증권 외화증권 거래설명서 - https://www.truefriend.com/main/customer/guide/Guide.jsp?&cmd=TF04ag010002¤tPage=1&num=64)\n\
    ■ output2에 조회되는 순위(rank)는 거래량을 기준으로 내림차순 정렬 시 나오는 순위인 점 참고 부탁드립니다."
