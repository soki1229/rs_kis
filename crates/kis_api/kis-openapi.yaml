  description: 해외주식 예약주문접수[v1_해외주식-002]
  example: "미국거래소 운영시간 외 미국주식을 예약 매매하기 위한 API입니다.\n\n* 해외주식 서비스 신청 후 이용 가능합니다. (아래\
    \ 링크 3번 해외증권 거래신청 참고)\nhttps://securities.koreainvestment.com/main/bond/research/_static/TF03ca010001.jsp\n\
    \n※ POST API의 경우 BODY값의 key값들을 대문자로 작성하셔야 합니다.\n   (EX. \"CANO\" : \"12345678\"\
    , \"ACNT_PRDT_CD\": \"01\",...)\n\n* 아래 각 국가의 시장별 예약주문 접수 가능 시간을 확인하시길 바랍니다.\n\
    \n미국 예약주문 접수시간\n1) 10:00 ~ 23:20 / 10:00 ~ 22:20 (서머타임 시)\n2) 주문제한 : 16:30 ~ 16:45\
    \ 경까지 (사유 : 시스템 정산작업시간)\n3) 23:30 정규장으로 주문 전송 (서머타임 시 22:30 정규장 주문 전송)\n4) 미국\
    \ 거래소 운영시간(한국시간 기준) : 23:30 ~ 06:00 (썸머타임 적용 시 22:30 ~ 05:00)\n\n홍콩 예약주문 접수시간\n\
    1) 09:00 ~ 10:20 접수, 10:30 주문전송\n2) 10:40 ~ 13:50 접수, 14:00 주문전송\n\n중국 예약주문 접수시간\n\
    1) 09:00 ~ 10:20 접수, 10:30 주문전송\n2) 10:40 ~ 13:50 접수, 14:00 주문전송\n\n일본 예약주문 접수시간\n\
    1) 09:10 ~ 12:20 까지 접수, 12:30 주문전송\n\n베트남 예약주문 접수시간\n1) 09:00 ~ 11:00 까지 접수, 11:15\
    \ 주문전송\n2) 11:20 ~ 14:50 까지 접수, 15:00 주문전송\n\n* 예약주문 유의사항\n1) 예약주문 유효기간 : 당일\n\
    \ - 미국장 마감 후, 미체결주문은 자동취소\n - 미국휴장 시, 익 영업일로 이전\n   (미국예약주문화면에서 취소 가능)\n2) 증거금\
    \ 및 잔고보유 : 체크 안함\n3) 주문전송 불가사유\n - 매수증거금 부족: 수수료 포함 매수금액부족, 환전, 시세이용료 출금, 인출에\
    \ 의한 증거금 부족\n - 기타 매수증거금 부족, 매도가능수량 부족, 주권변경 등 권리발생으로 인한 주문불가사유 발생\n4) 지정가주문만\
    \ 가능\n* 단 미국 예약매도주문(TTTT3016U)의 경우, MOO(장개시시장가)로 주문 접수 가능"
