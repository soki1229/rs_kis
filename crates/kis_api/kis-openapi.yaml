    \ 중 시장구분 값을 다음과 같이 입력 → 나스닥: BAQ, 뉴욕: BAY, 아멕스: BAA\n\n[참고자료]\n\n실시간시세(웹소켓) 파이썬\
    \ 샘플코드는 한국투자증권 Github 참고 부탁드립니다.\nhttps://github.com/koreainvestment/open-trading-api/blob/main/websocket/python/ws_domestic_overseas_all.py\n\
    \n실시간시세(웹소켓) API 사용방법에 대한 자세한 설명은 한국투자증권 Wikidocs 참고 부탁드립니다.\nhttps://wikidocs.net/book/7847\
    \ (국내주식 업데이트 완료, 추후 해외주식·국내선물옵션 업데이트 예정)\n\n종목코드 마스터파일 파이썬 정제코드는 한국투자증권 Github\
    \ 참고 부탁드립니다.\nhttps://github.com/koreainvestment/open-trading-api/tree/main/stocks_info"
  method: POST
  endpoint: /tryitout/HDFSCNT0
  real_tr_id: HDFSCNT0
  vts_tr_id: 모의투자 미지원
  request:
  - name: tr_id
    korean_name: 거래ID
    type: String
    required: Y
    description: HDFSCNT0
  - name: tr_key
    korean_name: D거래소명종목코드
    type: String
    required: Y
    description: '<미국 야간거래/아시아 주간거래 - 무료시세>

      D+시장구분(3자리)+종목코드

      예) DNASAAPL : D+NAS(나스닥)+AAPL(애플)

      [시장구분]

      NYS : 뉴욕, NAS : 나스닥, AMS : 아멕스 ,

      TSE : 도쿄, HKS : 홍콩,

      SHS : 상해, SZS : 심천

      HSX : 호치민, HNX : 하노이


      <미국 야간거래/아시아 주간거래 - 유료시세>

      ※ 유료시세 신청시에만 유료시세 수신가능

      "포럼 > FAQ > 해외주식 유료시세 신청방법" 참고

      R+시장구분(3자리)+종목코드

      예) RNASAAPL : R+NAS(나스닥)+AAPL(애플)

      [시장구분]

      NYS : 뉴욕, NAS : 나스닥, AMS : 아멕스 ,

      TSE : 도쿄, HKS : 홍콩,

      SHS : 상해, SZS : 심천

      HSX : 호치민, HNX : 하노이


      <미국 주간거래>

      R+시장구분(3자리)+종목코드

      예) RBAQAAPL : R+BAQ(나스닥)+AAPL(애플)

      [시장구분]

      BAY : 뉴욕(주간), BAQ : 나스닥(주간). BAA : 아멕스(주간)'
