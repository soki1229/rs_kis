apis:
- name: 접근토큰발급(P)
  description: '2021-12-29 11:22:33'
  example: "본인 계좌에 필요한 인증 절차로, 인증을 통해 접근 토큰을 부여받아 오픈API 활용이 가능합니다.\n\n1. 접근토큰(access_token)의\
    \ 유효기간은 24시간 이며(1일 1회발급 원칙) \n   갱신발급주기는 6시간 입니다.(6시간 이내는 기존 발급키로 응답)\n\n2. 접근토큰발급(/oauth2/tokenP)\
    \ 시 접근토큰값(access_token)과 함께 수신되는 \n   접근토큰 유효기간(acess_token_token_expired)을 이용해\
    \ 접근토큰을 관리하실 수 있습니다.\n\n\n[참고]\n\n'23.4.28 이후 지나치게 잦은 토큰 발급 요청건을 제어 하기 위해 신규 접근토큰발급\
    \ 이후 일정시간 이내에 재호출 시에는 직전 토큰값을 리턴하게 되었습니다. 일정시간 이후 접근토큰발급 API 호출 시에는 신규 토큰값을 리턴합니다.\
    \ \n접근토큰발급 API 호출 및 코드 작성하실 때 해당 사항을 참고하시길 바랍니다.\n\n※ 참고 : 포럼 > 공지사항 >  [수정] [중요]\
    \ 접근 토큰 발급 변경 안내"
  method: POST
  endpoint: /oauth2/tokenP
  real_tr_id: ''
  vts_tr_id: ''
  request:
  - name: grant_type
    korean_name: 권한부여 Type
    type: String
    required: Y
    description: client_credentials
  - name: appkey
    korean_name: 앱키
    type: String
    required: Y
    description: 한국투자증권 홈페이지에서 발급받은 appkey (절대 노출되지 않도록 주의해주세요.)
  - name: appsecret
    korean_name: 앱시크릿키
    type: String
    required: Y
    description: 한국투자증권 홈페이지에서 발급받은 appsecret (절대 노출되지 않도록 주의해주세요.)
  response: []
- name: 접근토큰폐기(P)
  description: '2021-12-29 11:22:33'
  example: 부여받은 접큰토큰을 더 이상 활용하지 않을 때 사용합니다.
  method: POST
  endpoint: /oauth2/revokeP
  real_tr_id: ''
  vts_tr_id: ''
  request:
  - name: appkey
    korean_name: 고객 앱Key
    type: String
    required: Y
    description: 한국투자증권 홈페이지에서 발급받은 appkey (절대 노출되지 않도록 주의해주세요.)
  - name: appsecret
    korean_name: 고객 앱Secret
    type: String
    required: Y
    description: 한국투자증권 홈페이지에서 발급받은 appsecret (절대 노출되지 않도록 주의해주세요.)
  - name: token
    korean_name: 접근토큰
    type: String
    required: Y
    description: 'OAuth 토큰이 필요한 API 경우 발급한 Access token

      일반고객(Access token 유효기간 1일, OAuth 2.0의 Client Credentials Grant 절차를 준용)

      법인(Access token 유효기간 3개월, Refresh token 유효기간 1년, OAuth 2.0의 Authorization Code
      Grant 절차를 준용)'
  response: []
- name: Hashkey
  description: '2021-12-29 11:22:33'
  example: '해쉬키(Hashkey)는 보안을 위한 요소로 사용자가 보낸 요청 값을 중간에 탈취하여 변조하지 못하도록 하는데 사용됩니다.

    해쉬키를 사용하면 POST로 보내는 요청(주로 주문/정정/취소 API 해당)의 body 값을 사전에 암호화시킬 수 있습니다.

    해쉬키는 비필수값으로 사용하지 않아도 POST API 호출은 가능합니다.'
  method: POST
  endpoint: /uapi/hashkey
  real_tr_id: ''
  vts_tr_id: ''
  request:
  - name: JsonBody
    korean_name: 요청값
    type: Object
    required: Y
    description: 'POST로 보낼 body값


      ex)

      datas = {

      "CANO": ''00000000'',

      "ACNT_PRDT_CD": "01",

      "OVRS_EXCG_CD": "SHAA"

      }'
  response: []
- name: 실시간 (웹소켓) 접속키 발급
  description: 실시간 (웹소켓) 접속키 발급[실시간-000]
  example: '실시간 (웹소켓) 접속키 발급받으실 수 있는 API 입니다.

    웹소켓 이용 시 해당 키를 appkey와 appsecret 대신 헤더에 넣어 API를 호출합니다.


    접속키의 유효기간은 24시간이지만, 접속키는 세션 연결 시 초기 1회만 사용하기 때문에 접속키 인증 후에는 세션종료되지 않는 이상 접속키 신규
    발급받지 않으셔도 365일 내내 웹소켓 데이터 수신하실 수 있습니다.'
  method: POST
  endpoint: /oauth2/Approval
  real_tr_id: ''
  vts_tr_id: ''
  request:
  - name: grant_type
    korean_name: 권한부여타입
    type: String
    required: Y
    description: '"client_credentials"'
  - name: appkey
    korean_name: 앱키
    type: String
    required: Y
    description: 한국투자증권 홈페이지에서 발급받은 appkey (절대 노출되지 않도록 주의해주세요.)
  - name: secretkey
    korean_name: 시크릿키
    type: String
    required: Y
    description: '한국투자증권 홈페이지에서 발급받은 appsecret (절대 노출되지 않도록 주의해주세요.)

      * 주의 : appsecret와 secretkey는 동일하오니 착오없으시기 바랍니다. (용어가 다른점 양해 부탁드립니다.)'
  response: []
- name: 주식주문(현금)
  description: 주식주문(현금)[v1_국내주식-001]
  example: "국내주식주문(현금) API 입니다. \n\n※ TTC0802U(현금매수) 사용하셔서 미수매수 가능합니다. 단, 거래하시는 계좌가\
    \ 증거금40%계좌로 신청이 되어있어야 가능합니다. \n※ 신용매수는 별도의 API가 준비되어 있습니다.\n\n※ ORD_QTY(주문수량),\
    \ ORD_UNPR(주문단가) 등을 String으로 전달해야 함에 유의 부탁드립니다.\n\n※ ORD_UNPR(주문단가)가 없는 주문은 상한가로\
    \ 주문금액을 선정하고 이후 체결이되면 체결금액로 정산됩니다.\n\n※ POST API의 경우 BODY값의 key값들을 대문자로 작성하셔야\
    \ 합니다.\n   (EX. \"CANO\" : \"12345678\", \"ACNT_PRDT_CD\": \"01\",...)\n\n※ 종목코드\
    \ 마스터파일 파이썬 정제코드는 한국투자증권 Github 참고 부탁드립니다.\n   https://github.com/koreainvestment/open-trading-api/tree/main/stocks_info"
  method: POST
  endpoint: /uapi/domestic-stock/v1/trading/order-cash
  real_tr_id: (매도) TTTC0011U (매수) TTTC0012U
  vts_tr_id: (매도) VTTC0011U (매수) VTTC0012U
  request:
  - name: CANO
    korean_name: 종합계좌번호
    type: String
    required: Y
    description: 종합계좌번호
  - name: ACNT_PRDT_CD
    korean_name: 계좌상품코드
    type: String
    required: Y
    description: 상품유형코드
  - name: PDNO
    korean_name: 상품번호
    type: String
    required: Y
    description: 종목코드(6자리) , ETN의 경우 7자리 입력
  - name: SLL_TYPE
    korean_name: 매도유형 (매도주문 시)
    type: String
    required: N
    description: '01@일반매도

      02@임의매매

      05@대차매도

      → 미입력시 01 일반매도로 진행'
  - name: ORD_DVSN
    korean_name: 주문구분
    type: String
    required: Y
    description: '[KRX]

      00 : 지정가

      01 : 시장가

      02 : 조건부지정가

      03 : 최유리지정가

      04 : 최우선지정가

      05 : 장전 시간외

      06 : 장후 시간외

      07 : 시간외 단일가

      11 : IOC지정가 (즉시체결,잔량취소)

      12 : FOK지정가 (즉시체결,전량취소)

      13 : IOC시장가 (즉시체결,잔량취소)

      14 : FOK시장가 (즉시체결,전량취소)

      15 : IOC최유리 (즉시체결,잔량취소)

      16 : FOK최유리 (즉시체결,전량취소)

      21 : 중간가

      22 : 스톱지정가

      23 : 중간가IOC

      24 : 중간가FOK


      [NXT]

      00 : 지정가

      03 : 최유리지정가

      04 : 최우선지정가

      11 : IOC지정가 (즉시체결,잔량취소)

      12 : FOK지정가 (즉시체결,전량취소)

      13 : IOC시장가 (즉시체결,잔량취소)

      14 : FOK시장가 (즉시체결,전량취소)

      15 : IOC최유리 (즉시체결,잔량취소)

      16 : FOK최유리 (즉시체결,전량취소)

      21 : 중간가

      22 : 스톱지정가

      23 : 중간가IOC

      24 : 중간가FOK


      [SOR]

      00 : 지정가

      01 : 시장가

      03 : 최유리지정가

      04 : 최우선지정가

      11 : IOC지정가 (즉시체결,잔량취소)

      12 : FOK지정가 (즉시체결,전량취소)

      13 : IOC시장가 (즉시체결,잔량취소)

      14 : FOK시장가 (즉시체결,전량취소)

      15 : IOC최유리 (즉시체결,잔량취소)

      16 : FOK최유리 (즉시체결,전량취소)'
  - name: ORD_QTY
    korean_name: 주문수량
    type: String
    required: Y
    description: 주문수량
  - name: ORD_UNPR
    korean_name: 주문단가
    type: String
    required: Y
    description: '주문단가

      시장가 등 주문시, "0"으로 입력'
  - name: CNDT_PRIC
    korean_name: 조건가격
    type: String
    required: N
    description: 스탑지정가호가 주문 (ORD_DVSN이 22) 사용 시에만 필수
  - name: EXCG_ID_DVSN_CD
    korean_name: 거래소ID구분코드
    type: String
    required: N
    description: '한국거래소 : KRX

      대체거래소 (넥스트레이드) : NXT

      SOR (Smart Order Routing) : SOR

      → 미입력시 KRX로 진행되며, 모의투자는 KRX만 가능'
  response: []
