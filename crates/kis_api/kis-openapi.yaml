    \ 호가 및 호가 잔량 정보)\n                                홍콩, 베트남, 중국, 일본 - 15분지연\n  \
    \ 미국의 경우 0분 지연 시세로 제공되나, 장중 당일 시가는 상이할 수 있으며, 익일 정정 표시됩니다.\n\n[미국주식시세 이용시 유의사항]\n\
    ■ 무료 실시간 시세(나스닥 토탈뷰)를 별도 신청없이 제공하고 있으며, 유료 시세 서비스를 신청하시더라도 OpenAPI의 경우 무료 시세로만\
