    \ 가능)만 정상 출력됩니다. \n잔고 확인을 원하실 경우에는 해외주식 잔고[v1_해외주식-006] API 사용을 부탁드립니다.)\n\n*\
    \ 해외주식 서비스 신청 후 이용 가능합니다. (아래 링크 3번 해외증권 거래신청 참고)\nhttps://securities.koreainvestment.com/main/bond/research/_static/TF03ca010001.jsp\n\
    \n해외주식 체결기준현재잔고 유의사항\n1. 해외증권 체결기준 잔고현황을 조회하는 화면입니다.\n2. 온라인국가는 수수료(국내/해외)가 반영된\
    \ 최종 정산금액으로 잔고가 변동되며, 결제작업 지연등으로 인해 조회시간은 차이가 발생할 수 있습니다.\n   - 아시아 온라인국가 : 매매일\
    \ 익일    08:40 ~ 08:45분 경\n   - 미국 온라인국가   : 당일 장 종료후 08:40 ~ 08:45분 경\n  ※ 단,\
    \ 애프터연장 참여 신청계좌는 10:30 ~ 10:35분 경(Summer Time : 09:30 ~ 09:35분 경)에 최종 정산금액으로 변동됩니다.\n\
    3. 미국 현재가 항목은 주간시세 및 애프터시세는 반영하지 않으며, 정규장 마감 후에는 종가로 조회됩니다.\n4. 온라인국가를 제외한 국가의\
    \ 현재가는 실시간 시세가 아니므로 주문화면의 잔고 평가금액 등과 차이가 발생할 수 있습니다.\n5. 해외주식 담보대출 매도상환 체결내역은\
    \ 해당 잔고화면에 반영되지 않습니다.\n   결제가 완료된 이후 외화잔고에 포함되어 반영되오니 참고하여 주시기 바랍니다.\n6. 외화평가금액은\
    \ 당일 최초고시환율이 적용된 금액으로 실제 환전금액과는 차이가 있습니다. \n7. 미국은 메인 시스템이 아닌 별도 시스템을 통해 거래되므로,\
    \ 18시 10~15분 이후 발생하는 미국 매매내역은 해당 화면에 실시간으로 반영되지 않으니 하단 내용을 참고하여 안내하여 주시기 바랍니다.\
    \ \n   [외화잔고 및 해외 유가증권 현황 조회]\n   - 일반/통합증거금 계좌 : 미국장 종료 + 30분 후 부터 조회 가능\n  \
    \                          단, 통합증거금 계좌에 한해 주문금액은 외화잔고 항목에 실시간 반영되며, 해외 유가증권 현황은\
    \ 반영되지\n                            않아 해외 유가증권 평가금액이 과다 또는 과소 평가될 수 있습니다. \n \
    \  - 애프터연장 신청계좌  : 실시간 반영 \n                            단, 시스템정산작업시간(23:40~00:10)\
    \ 및 거래량이 많은 경우 메인시스템에 반영되는 시간으로 인해 차이가 \n                            발생할 수 있습니다.\n\
    \   ※ 배치작업시간에 따라 시간은 변동될 수 있습니다."
  method: GET
  endpoint: /uapi/overseas-stock/v1/trading/inquire-present-balance
