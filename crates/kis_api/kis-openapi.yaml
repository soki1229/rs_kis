    1. 해외선물 투자자별 미결제약정 자료는 미국상품선물위원회(CFTC)에서 매주 1회 발표하고 있습니다.\n2. 기준일은 매주 화요일이며, 발표는\
    \ 매주 금요일 15:30 (미국동부표준시)에 하며, 당사는 매주 토요일 아침에 자료를 업데이트하고 있습니다.\n3. 활용방법 : CFTC에서\
    \ 발표하는 미결제약점 동향자료는 각 선물시장의 투기자금 동향을 파약하는데 용이하며, 특히, 상품시장에서 유용하게 활용할 수 있습니다.\n\
    4. 주요항목 설명\n. 투기거래자 : 실물보유 또는 보유중인 실물에 대한 헤지목적이 아닌 가격변동에 따른 이익을 목적으로 거래하는 고객으로\
    \ 주로 투자은행, 자산운용사, 헤지펀드, 개인투자자등임\n\uFEFF\uFEFF. 헤지거래자 : 실물보유 또는 보유중인 실물에 대한 헤지목적으로\
    \ 거래하는 고객으로 주로 일반기업, 생산업체, 원자재공급업체등임.\n\uFEFF\uFEFF. 보고누락분 : 시장전체 미결제약정과 투기거래자와\
    \ 헤지거래자 보고분 합계와의 차이로 투자주제가 확인안된 거래임.\n. 투자자 : 최종거래고객 기준이 아닌 거래소 회원 단위 기준임.\n5.\
    \ CFTC 홈페이지: http://www.cftc.gov/index.htm"
