- name: 해외주식 주문
  description: 해외주식 주문[v1_해외주식-001]
  example: "해외주식 주문 API입니다.\n\n* 모의투자의 경우, 모든 해외 종목 매매가 지원되지 않습니다. 일부 종목만 매매 가능한 점\
    \ 유의 부탁드립니다.\n\n* 해외주식 서비스 신청 후 이용 가능합니다. (아래 링크 3번 해외증권 거래신청 참고)\nhttps://securities.koreainvestment.com/main/bond/research/_static/TF03ca010001.jsp\n\
    \n* 해외 거래소 운영시간 외 API 호출 시 에러가 발생하오니 운영시간을 확인해주세요. (미국주식 주간주문은 \"해외주식 미국주간주문\"\
    을 이용)\n* 해외 거래소 운영시간(한국시간 기준)\n1) 미국 : 23:30 ~ 06:00 (썸머타임 적용 시 22:30 ~ 05:00)\
    \ \n   * 프리마켓(18:00 ~ 23:30, Summer Time : 17:00 ~ 22:30), 애프터마켓(06:00 ~ 07:00,\
    \ Summer Time : 05:00 ~ 07:00) 시간대에도 주문 가능\n2) 일본 : (오전) 09:00 ~ 11:30, (오후) 12:30\
    \ ~ 15:00\n3) 상해 : 10:30 ~ 16:00\n4) 홍콩 : (오전) 10:30 ~ 13:00, (오후) 14:00 ~ 17:00\n\
    \n* 기존에는 내부통제 요건에 따라 상장주식수의 1%를 초과하는 주문은 접수할 수 없었으나, 2025.08.14 시행 이후부터는 접수가 가능합니다.\
    \ 단, 타 매체(HTS 등)는 안내 팝업 확인 후 주문이 가능하지만, Open API는 별도의 안내 화면 없이 주문이 바로 접수되므로 유의하시기\
    \ 바랍니다.\n\n\n※ POST API의 경우 BODY값의 key값들을 대문자로 작성하셔야 합니다.\n   (EX. \"CANO\" :\
    \ \"12345678\", \"ACNT_PRDT_CD\": \"01\",...)\n\n※ 종목코드 마스터파일 파이썬 정제코드는 한국투자증권\
    \ Github 참고 부탁드립니다.\n   https://github.com/koreainvestment/open-trading-api/tree/main/stocks_info"
