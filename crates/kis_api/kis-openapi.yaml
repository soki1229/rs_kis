  example: "국내주식주문(신용) API입니다. \n※ 모의투자는 사용 불가합니다.\n\n※ POST API의 경우 BODY값의 key값들을\
    \ 대문자로 작성하셔야 합니다.\n   (EX. \"CANO\" : \"12345678\", \"ACNT_PRDT_CD\": \"01\",...)"
