    \ 소수점) 값을 활용하셔야 정확한 값을 받아오실 수 있습니다.\n\n- ffcode.mst(해외선물종목마스터 파일) 다운로드 방법 2가지\n\
    \  1) 한국투자증권 Github의 파이썬 샘플코드를 사용하여 mst 파일 다운로드 및 excel 파일로 정제   \n     https://github.com/koreainvestment/open-trading-api/blob/main/stocks_info/overseas_future_code.py\n\
    \   \n  2) 혹은 포럼 - FAQ - 종목정보 다운로드 - 해외선물옵션 클릭하셔서 ffcode.mst(해외선물종목마스터 파일)을 다운로드\
    \ 후\n     Github의 헤더정보(https://github.com/koreainvestment/open-trading-api/blob/main/stocks_info/해외선물옵션정보.h)를\
    \ 참고하여 해석\n\n- 소수점 계산 시, ffcode.mst(해외선물종목마스터 파일)의 sCalcDesz(계산 소수점) 값 참고\n  EX)\
    \ ffcode.mst 파일의 sCalcDesz(계산 소수점) 값\n       품목코드 6A 계산소수점 -4 → 시세 6882.5 수신 시\
    \ 0.68825 로 해석\n       품목코드 GC 계산소수점 -1 → 시세 19225 수신 시 1922.5 로 해석\n\n\n[참고자료]\n\
    \n실시간시세(웹소켓) 파이썬 샘플코드는 한국투자증권 Github 참고 부탁드립니다.\nhttps://github.com/koreainvestment/open-trading-api/blob/main/websocket/python/ws_domestic_overseas_all.py\n\
    \n실시간시세(웹소켓) API 사용방법에 대한 자세한 설명은 한국투자증권 Wikidocs 참고 부탁드립니다.\nhttps://wikidocs.net/book/7847\
    \ (국내주식 업데이트 완료, 추후 해외주식·국내선물옵션 업데이트 예정)\n\n종목코드 마스터파일 파이썬 정제코드는 한국투자증권 Github\
    \ 참고 부탁드립니다.\nhttps://github.com/koreainvestment/open-trading-api/tree/main/stocks_info"
