    \n* 해외 거래소 운영시간 외 API 호출 시 에러가 발생하오니 운영시간을 확인해주세요.\n* 해외 거래소 운영시간(한국시간 기준)\n1)\
    \ 미국 : 23:30 ~ 06:00 (썸머타임 적용 시 22:30 ~ 05:00) \n   * 프리마켓(18:00 ~ 23:30, Summer\
    \ Time : 17:00 ~ 22:30), 애프터마켓(06:00 ~ 07:00, Summer Time : 05:00 ~ 07:00) 시간대에도\
    \ 주문 가능\n2) 일본 : (오전) 09:00 ~ 11:30, (오후) 12:30 ~ 15:00\n3) 상해 : 10:30 ~ 16:00\n\
    4) 홍콩 : (오전) 10:30 ~ 13:00, (오후) 14:00 ~ 17:00\n\n※ POST API의 경우 BODY값의 key값들을\
