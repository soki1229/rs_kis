- name: 해외선물옵션 증거금상세
  description: 해외선물옵션 증거금상세 [해외선물-032]
  example: "해외선물옵션 증거금상세 API입니다.\n한국투자 HTS(eFriend Plus) > [2711] 해외선물옵션 증거금상세 화면\
    \ 의 기능을 API로 개발한 사항으로, 해당 화면을 참고하시면 기능을 이해하기 쉽습니다.\n\n[증거금 상세설명]\n- SPAN, EUREX\
    \ 증거금\n1. 가격변동증거금 : 보유하고 있는 미결제를 Product Class 별로 구간[SPAN-16구간, EUREX-29구간)손익\
    \ 합계액 산출하며 최대손실구간의 금액을 해당 Class의 증거금으로 산정\n2. 스프레드증거금 : 보유하고 있는 미결제를 Product Class\
    \ 별로 스프레드 산정하며 스프레드 증거금 적용\n** 스프레드 산정방법 : SPAN은 선물+옵션의 Delta Spread로 계산, EUREX는\
    \ 선물의 Spread만 산정 보유중인 옵선가치를 평가하며 청산가치가 양수(고객미 수취할 금액이 있는 경우)에 해당하는 금액을 증거금에서 할인\n\
    3. 옵션가격증거금 : 보유중인 옵션가치를 평가하여 청산가치가 양수(고객이 수취할 금액이 있는 경우)에 해당하는 금액을 증거금에서 할인\n\
    **계산식 : MAXID, 온선평가대금 Class별 합계액) ** 산출된 값을 음수처리함 옵션 미결제약정에 대해 최소로 징구하는 증거금\n\
    4. 옵선최소증거금 증거금 : 옵션 미결제약정에 대해 최소로 징구하는 증거금\n\uFEFF** SPAN : 매도옵선회소증거금(행사가별로 상미)과\
    \ 매수옵선최소증거금(계약당 1Tick에 해당하는 금액)\n** EUREX : 매수옵선최소증거금(계약당 1Tick에 해당하는 금액)(EUREX는\
    \ 매도옵션최소증거금이 가격변동증거금에 포함되어 있음)\n5. 일방해소증거금 : (기본개념)보유중인 포트폴리오 중에서 머느 일방향을 전량 청산했을\
    \ 경우 잔존하는 미결제 약정의 최대손실가능액을 사전에 징구함\n가격상승포지션과 가격하락포지션에 대해 최불리증거금을 각각 산정하며 큰 금액을\
    \ 증거금으로 장구\n\uFEFF* 가격장승포지션 : 선물매수포지션, 풋옵션매도포지션\n\uFEFF* 가격하락포지션 : 선물매도포지션, 콜옵션매도포지선\n\
    \n- 일반 증거금\n1. 선물미결제증거금 : 선물미결제약정에 대해 계약당증거금율 적용\n2. 매도옵션미결제증거금 : 매도옵션미결제약정에 대해\
    \ 옵선계약당 증거금을 적용\n** 옵션계약당증거금 : 각 종목별 최불리증거금액으로 해외 거래소에서 계산하며 제공되는 데이터임\n3. 매수옵션미결제증거금\
    \ : 매수옵션최소증거금으로 1Tick에 해당하는 금액을 적용\n\n- 주문 증거금\n1. 선물 주문증거금 : 선물 미체결주문에 대해 계약당\
    \ 증거금을 적용(신규주문에 한해 징수)\n2. 매도옵션 주문증거금 : 옵션매도 미체결주문에 대해 계약당증거금을 적용(신규주문에 한해 징수)\n\
    3. 매수옵션 주문증거금 : 옵션매수 미체결주문에 대해 최소증거금(Tick Value와 10 중에서 큰 금액)과 만기행사예약한 미체결주문에\
    \ 대한 행사예약증거금을 징수\n4. 매수옵션 주문대금 : 옵션매수 미체결주문의 매수대금(주문가격을 기준으로 대금 산정, 시장가주문시 현재가\
    \ +50틱으로 매수대금 산정)\n5. 매수옵선행사예약증거금 : 옵선매수 미결제약정 중에서 행사예약한 수량에 대해 기초자산선물의 계약당 증거금을\
    \ 징수"
  method: GET
  endpoint: /uapi/overseas-futureoption/v1/trading/margin-detail
  real_tr_id: OTFM3115R
  vts_tr_id: 모의투자 미지원
  request:
  - name: CANO
    korean_name: 종합계좌번호
    type: String
    required: Y
    description: ''
  - name: ACNT_PRDT_CD
    korean_name: 계좌상품코드
    type: String
    required: Y
    description: ''
  - name: CRCY_CD
    korean_name: 통화코드
    type: String
    required: Y
    description: '''TKR(TOT_KRW), TUS(TOT_USD),

      USD(미국달러), HKD(홍콩달러),

      CNY(중국위안화), JPY )일본엔화), VND(베트남동)'''
  - name: INQR_DT
    korean_name: 조회일자
    type: String
    required: Y
    description: ''
  response: []
- name: 해외선물종목현재가
  description: 해외선물종목현재가 [v1_해외선물-009]
  example: "(중요) 해외선물시세 출력값을 해석하실 때 ffcode.mst(해외선물종목마스터 파일)에 있는 sCalcDesz(계산 소수점)\
    \ 값을 활용하셔야 정확한 값을 받아오실 수 있습니다.\n\n- ffcode.mst(해외선물종목마스터 파일) 다운로드 방법 2가지\n  1)\
    \ 한국투자증권 Github의 파이썬 샘플코드를 사용하여 mst 파일 다운로드 및 excel 파일로 정제   \n     https://github.com/koreainvestment/open-trading-api/blob/main/stocks_info/overseas_future_code.py\n\
    \   \n  2) 혹은 포럼 - FAQ - 종목정보 다운로드(해외) - 해외지수선물 클릭하셔서 ffcode.mst(해외선물종목마스터 파일)을\
    \ 다운로드 후\n     Github의 헤더정보(https://github.com/koreainvestment/open-trading-api/blob/main/stocks_info/해외선물정보.h)를\
    \ 참고하여 해석\n\n- 소수점 계산 시, ffcode.mst(해외선물종목마스터 파일)의 sCalcDesz(계산 소수점) 값 참고\n  EX)\
    \ ffcode.mst 파일의 sCalcDesz(계산 소수점) 값\n       품목코드 6A 계산소수점 -4 → 시세 6882.5 수신 시\
    \ 0.68825 로 해석\n       품목코드 GC 계산소수점 -1 → 시세 19225 수신 시 1922.5 로 해석\n\n\n[참고자료]\n\
    ※ 종목코드 마스터파일 파이썬 정제코드는 한국투자증권 Github 참고 부탁드립니다.\n   https://github.com/koreainvestment/open-trading-api/tree/main/stocks_info\n\
    \   \n※ 모의투자는 실전투자계좌를 활용하여 조회 부탁드립니다.\n\n※ CME, SGX 거래소 API시세는 유료시세로 HTS/MTS에서\
    \ 유료가입 후 익일부터 시세 이용 가능합니다.\n포럼 > FAQ > 해외선물옵션 API 유료시세 신청방법(CME, SGX 거래소)"
