  example: "해외주식분봉조회 API입니다. 실전계좌의 경우, 한 번의 호출에 최근 120건까지 확인 가능합니다.\nNEXT 및 KEYB 값을\
    \ 사용하여 데이터를 계속해서 다음 조회할 수 있으며, 최대 다음조회 가능 기간은 약 1개월입니다. \n\n※ 해외주식분봉조회 조회 방법\n\
    params\n. 초기 조회: \n - PINC: \"1\" 입력\n - NEXT: 처음 조회 시, \"\" 공백 입력\n - KEYB: 처음\
    \ 조회 시, \"\" 공백 입력\n. 다음 조회:\n - PINC: \"1\" 입력\n - NEXT: \"1\" 입력\n - KEYB: 이전\
    \ 조회 결과의 마지막 분봉 데이터를 이용하여, 1분 전 혹은 n분 전의 시간을 입력 (형식: YYYYMMDDHHMMSS, ex. 20241014140100)\n\
    \n* 따라서 분봉데이터를 기간별로 수집하고자 하실 경우 NEXT, KEYB 값을 이용하시면서 다음조회하시면 됩니다.\n* 한국투자 Github에서\
    \ 해외주식 분봉 다음조회 파이썬 샘플코드 참고하실 수 있습니다. (아래 링크 참고)\n  https://github.com/koreainvestment/open-trading-api/blob/main/rest/get_ovsstk_chart_price.py\n\
    \n※ 해외주식 분봉은 정규장만 과거조회 가능합니다.\n미국주식 주간거래( EXCD: BAY, BAQ, BAA )의 경우 본 API로 최대\
    \ 1일치 분봉만 조회가 가능합니다.\n\n※ 지연시세 지연시간 : 미국 - 실시간무료(0분지연) / 홍콩, 베트남, 중국, 일본 - 15분지연\n\
    \   미국의 경우 0분지연시세로 제공되나, 장중 당일 시가는 상이할 수 있으며, 익일 정정 표시됩니다.\n\n해외주식 시세는 무료시세(지연시세)만이\
    \ 제공되며, API로는 유료시세(실시간시세)를 받아보실 수 없습니다.\n\n※ 지연시세 지연시간 : 미국 - 실시간무료(0분 지연, 나스닥\
    \ 마켓센터에서 거래되는 호가 및 호가 잔량 정보)\n                                홍콩, 베트남, 중국, 일본\
    \ - 15분지연\n   미국의 경우 0분 지연 시세로 제공되나, 장중 당일 시가는 상이할 수 있으며, 익일 정정 표시됩니다.\n\n[미국주식시세\
    \ 이용시 유의사항]\n■ 무료 실시간 시세(나스닥 토탈뷰)를 별도 신청없이 제공하고 있으며, 유료 시세 서비스를 신청하시더라도 OpenAPI의\
    \ 경우 무료 시세로만 제공하고있습니다.\n※ 무료(매수/매도 각 10호가) : 나스닥 마켓센터에서 거래되는 호가 및 호가 잔량 정보\n※\
