- name: 해외주식 실시간호가
  description: '2021-12-29 11:22:33'
  example: "해외주식 실시간호가 API를 이용하여 미국 실시간 10호가(매수/매도) 시세가 무료로 제공됩니다. (미국은 유료시세 제공 X)\n\
    \n아시아 국가의 경우, HTS(efriend Plus) [7781] 시세신청(실시간) 화면에서 유료 서비스 신청 시, \n\"해외주식 실시간호가\
    \ HDFSASP0\" 을 이용하여 아시아국가 유료시세(실시간호가)를 받아보실 수 있습니다. (24.11.29 반영)\n(아시아 국가 무료시세는\
    \ \"해외주식 지연호가(아시아) HDFSASP1\" 를 이용하시기 바랍니다.)\n\n※ 미국 : 실시간 무료, 매수/매도 각 10호가 (0분지연,\
    \ 나스닥 마켓센터에서 거래되는 호가 및 호가 잔량 정보)\n※ 아시아(홍콩, 베트남, 중국, 일본) : 실시간 유료 (단, 중국은 HTS[7781]에서\
    \ 실시간시세 무료로 신청 후 이용 가능)\n\n해당 API로 미국주간거래(10:00~16:00) 시세 조회도 가능합니다.\n※ 미국주간거래\
    \ 실시간 조회 시, 맨 앞자리(R), tr_key 중 시장구분 값을 다음과 같이 입력 → 나스닥: BAQ, 뉴욕: BAY, 아멕스: BAA\n\
    \n[참고자료]\n\n실시간시세(웹소켓) 파이썬 샘플코드는 한국투자증권 Github 참고 부탁드립니다.\nhttps://github.com/koreainvestment/open-trading-api/blob/main/websocket/python/ws_domestic_overseas_all.py\n\
    \n실시간시세(웹소켓) API 사용방법에 대한 자세한 설명은 한국투자증권 Wikidocs 참고 부탁드립니다.\nhttps://wikidocs.net/book/7847\
    \ (국내주식 업데이트 완료, 추후 해외주식·국내선물옵션 업데이트 예정)\n\n​[미국주식시세 이용시 유의사항]\n\n■ 무료 실시간 시세(나스닥\
    \ 토탈뷰)를 별도 신청없이 제공하고 있으며, 유료 시세 서비스를 신청하시더라도 OpenAPI의 경우 무료 시세로만 제공하고있습니다. \n\
    \ \n※ 무료(매수/매도 각 10호가) : 나스닥 마켓센터에서 거래되는 호가 및 호가 잔량 정보\n※ 유료(매수/매도 각 1호가) : OpenAPI\
    \ 서비스 미제공\n\n■ 무료 실시간 시세 서비스는 유료 실시간 시세 서비스 대비 평균 50% 수준에 해당하는 정보이므로 현재가/호가/순간체결량/차트\
    \ 등에서 일시적·부분적 차이가 \n있을 수 있으며 이로 인해 발생하는 손실에 대해서 당사가 책임지지 않습니다.\n\n■ 무료 실시간 시세\
    \ 서비스의 시가, 저가, 고가, 종가는 유료 실시간 시세 서비스와 다를 수 있으며, \n종목별 과거 데이터(거래량, 시가, 종가, 고가,\
    \ 차트 데이터 등)는 장 종료 후(오후 12시경) 유료 실시간 시세 서비스 데이터와 동일하게 업데이트됩니다.\n(출처: 한국투자증권 외화증권\
    \ 거래설명서 - https://securities.koreainvestment.com/main/customer/guide/Guide.jsp?&cmd=TF04ag010002¤tPage=1&num=64)"
  method: POST
  endpoint: /tryitout/HDFSASP0
  real_tr_id: HDFSASP0
  vts_tr_id: 모의투자 미지원
  request:
  - name: tr_id
    korean_name: 거래ID
    type: String
    required: Y
    description: HDFSASP0
  - name: tr_key
    korean_name: R거래소명종목코드
    type: String
    required: Y
    description: '<미국 야간거래 - 무료시세>

      D+시장구분(3자리)+종목코드

      예) DNASAAPL : D+NAS(나스닥)+AAPL(애플)

      [시장구분]

      NYS : 뉴욕, NAS : 나스닥, AMS : 아멕스


      <미국 주간거래>

      R+시장구분(3자리)+종목코드

      예) RBAQAAPL : R+BAQ(나스닥)+AAPL(애플)

      [시장구분]

      BAY : 뉴욕(주간), BAQ : 나스닥(주간). BAA : 아멕스(주간)


      <아시아국가 - 유료시세>

      ※ 유료시세 신청시에만 유료시세 수신가능

      "포럼 > FAQ > 해외주식 유료시세 신청방법" 참고

      R+시장구분(3자리)+종목코드

      예) RHKS00003 : R+HKS(홍콩)+00003(홍콩중화가스)

      [시장구분]

      TSE : 도쿄, HKS : 홍콩,

      SHS : 상해, SZS : 심천

      HSX : 호치민, HNX : 하노이'
  response: []
