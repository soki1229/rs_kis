  example: "선물옵션 주문 건에 대하여 정정 및 취소하는 API입니다. 단, 이미 체결된 건은 정정 및 취소가 불가합니다.\n\n※ POST\
    \ API의 경우 BODY값의 key값들을 대문자로 작성하셔야 합니다.\n   (EX. \"CANO\" : \"12345678\", \"ACNT_PRDT_CD\"\
    : \"01\",...)"
  method: POST
  endpoint: /uapi/domestic-futureoption/v1/trading/order-rvsecncl
  real_tr_id: (주간 정정/취소) TTTO1103U (야간 정정/취소) (구) JTCE1002U (신) STTN1103U
  vts_tr_id: (주간 정정/취소) VTTO1103U (야간은 모의투자 미제공)
  request:
  - name: ORD_PRCS_DVSN_CD
    korean_name: 주문처리구분코드
    type: String
    required: Y
    description: '02 : 주문전송'
  - name: CANO
    korean_name: 종합계좌번호
    type: String
    required: Y
    description: 계좌번호 체계(8-2)의 앞 8자리
  - name: ACNT_PRDT_CD
    korean_name: 계좌상품코드
    type: String
    required: Y
    description: 계좌번호 체계(8-2)의 뒤 2자리
  - name: RVSE_CNCL_DVSN_CD
    korean_name: 정정취소구분코드
    type: String
    required: Y
    description: '01 : 정정

      02 : 취소'
  - name: ORGN_ODNO
    korean_name: 원주문번호
    type: String
    required: Y
    description: 정정 혹은 취소할 주문의 번호
  - name: ORD_QTY
    korean_name: 주문수량
    type: String
    required: Y
    description: '[Header tr_id TTTO1103U(선물옵션 정정취소 주간)]

      전량일경우 0으로 입력


      [Header tr_id JTCE1002U(선물옵션 정정취소 야간)]

      일부수량 정정 및 취소 불가, 주문수량 반드시 입력 (공백 불가)

