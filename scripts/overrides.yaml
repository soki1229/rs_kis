# Manual patches for incorrect portal data
apis:
  # Example: Correcting a misspelled endpoint or adding missing info
  - endpoint: "/uapi/domestic-stock/v1/trading/order-cash"
    name: "주식주문(현금)"
    patch:
      description: "국내주식 현금 주문을 수행하는 API입니다. (매수/매도)"

# Global replacements in descriptions
replacements:
  - search: "appkey"
    replace: "`app_key`"
  - search: "appsecret"
    replace: "`app_secret`"

# TR_ID overrides: correct compound or erroneous TR_IDs scraped from the portal.
# Verified against https://github.com/koreainvestment/open-trading-api official samples.
# Each entry overrides realTrId / virtualTrId for the given endpoint.
# Compound TR_IDs (buy/sell variants) are expressed using the portal label syntax:
#   "(매수) CODE1 (매도) CODE2"
# generate_code.py will split these into separate _buy / _sell methods.
tr_id_overrides:

  # --- 국내주식 주문 ---
  # 포털: "(매도) TTTC0011U (매수) TTTC0012U" / "(매도) VTTC0011U (매수) VTTC0012U"
  # 공식 샘플 확인: TTTC0011U(매도) TTTC0012U(매수) / VTTC0011U(매도) VTTC0012U(매수)
  - endpoint: "/uapi/domestic-stock/v1/trading/order-cash"
    real: "(매도) TTTC0011U (매수) TTTC0012U"
    vts:  "(매도) VTTC0011U (매수) VTTC0012U"

  # 포털: "(3개월이내) TTTC0081R (3개월이전) CTSC9215R" / "(3개월이내) VTTC0081R (3개월이전) VTSC9215R"
  # 공식 샘플 확인: TTTC0081R(3개월이내) CTSC9215R(3개월이전) / VTTC0081R(3개월이내) VTSC9215R(3개월이전)
  - endpoint: "/uapi/domestic-stock/v1/trading/inquire-daily-ccld"
    real: "(3개월이내) TTTC0081R (3개월이전) CTSC9215R"
    vts:  "(3개월이내) VTTC0081R (3개월이전) VTSC9215R"

  # --- 해외주식 주문 ---
  # 실전: TTTT1002U(매수) TTTT1006U(매도)
  # VTS:  VTTT1002U(매수) VTTT1001U(매도) ← 포털 원본이 맞음
  # 주의: 이전에 VTTT1006U로 잘못 override했으나, 실제 VTS API 호출로 검증 결과
  #       VTTT1001U → "모의투자 장시작전" (정상), VTTT1006U → "해당업무 미제공" (오류)
  - endpoint: "/uapi/overseas-stock/v1/trading/order"
    real: "(미국매수) TTTT1002U (미국매도) TTTT1006U"
    vts:  "(미국매수) VTTT1002U (미국매도) VTTT1001U"

  # 포털: "(미국 정정·취소) TTTT1004U ..." / "(미국 정정·취소) VTTT1004U ..."
  # 공식 샘플 확인: TTTT1004U / VTTT1004U
  - endpoint: "/uapi/overseas-stock/v1/trading/order-rvsecncl"
    real: "TTTT1004U"
    vts:  "VTTT1004U"
